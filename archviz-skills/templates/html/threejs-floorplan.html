<!--
  Three.js Floor Plan Visualization (archviz-skills)
  Use for: floor plan extrusion, multi-floor navigation, room layout
  Stack: Three.js (CDN) + animejs (CDN) + OrbitControls
  Dials: Complexity 5, Density 4, Restraint 7
  Tokens: structure=#a8a29e, floor=#e8e4e0, accent-3d=#002FA7
  Self-contained: no build step, no external models
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floor Plan — archviz-skills</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f4; font-family: -apple-system, 'Helvetica Neue', sans-serif; overflow: hidden; }
  #canvas { width: 100vw; height: 100vh; display: block; }
  #ui {
    position: fixed; top: 20px; left: 20px; z-index: 10;
    display: flex; gap: 8px; flex-direction: column;
  }
  .btn {
    background: #e8e4e0; border: 1px solid #a8a29e; color: #1B365D;
    padding: 8px 16px; font-size: 13px; cursor: pointer;
    font-weight: 500; letter-spacing: 0.02em;
    transition: background 0.2s;
  }
  .btn:hover { background: #d6d3d1; }
  .btn.active { background: #002FA7; color: #f5f5f4; border-color: #002FA7; }
  #info {
    position: fixed; bottom: 20px; left: 20px; z-index: 10;
    color: #78716c; font-size: 12px; line-height: 1.6;
  }
  #floor-label {
    position: fixed; top: 20px; right: 20px; z-index: 10;
    font-size: 48px; font-weight: 200; color: #a8a29e;
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>
<div id="ui">
  <button class="btn" onclick="goFloor(3)">4F · 屋顶</button>
  <button class="btn" onclick="goFloor(2)">3F · 办公</button>
  <button class="btn" onclick="goFloor(1)">2F · 教室</button>
  <button class="btn active" onclick="goFloor(0)">1F · 门厅</button>
  <button class="btn" onclick="showAll()">全部楼层</button>
  <button class="btn" onclick="toggleExplode()">分解</button>
</div>
<div id="floor-label">1F</div>
<div id="info">
  楼层平面图 · archviz-skills<br>
  点击楼层按钮切换 · 鼠标拖拽旋转
</div>
<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "animejs": "https://cdn.jsdelivr.net/npm/animejs@4.4.1/dist/bundles/anime.esm.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { animate } from 'animejs';

// animejs v4 helper
function tween(target, props) { return animate(target, props); }

// === Tokens ===
const TOKENS = {
  wall:    0xa8a29e,
  floor:   0xe8e4e0,
  accent:  0x002FA7,
  room:    0xd6d3d1,
  door:    0x78716c,
  ambient: 0xf5f5f4,
  ground:  0xd6d3d1,
};

// === Scene ===
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(TOKENS.ambient);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(20, 18, 20);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 60;
controls.maxPolarAngle = Math.PI / 2 + 0.1;
controls.target.set(0, 4, 0);

// === Lights ===
scene.add(new THREE.HemisphereLight(TOKENS.ambient, TOKENS.ground, 0.7));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(15, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.2));

// === Floor data (procedural rooms) ===
const FLOOR_H = 3.2;
const FLOOR_W = 14;
const FLOOR_D = 10;
const WALL_H = 2.8;
const WALL_T = 0.15;

const floorPlans = [
  { // 1F: 门厅
    label: '1F',
    rooms: [
      { x: -5, z: -3, w: 10, d: 6, name: '门厅', color: 0xe8e4e0 },
      { x: -5, z: 3, w: 4, d: 4, name: '值班室', color: 0xd6d3d1 },
      { x: -1, z: 3, w: 4, d: 4, name: '设备间', color: 0xd6d3d1 },
      { x: 3, z: 3, w: 4, d: 4, name: '楼梯间', color: 0xc8c4c0 },
    ]
  },
  { // 2F: 教室
    label: '2F',
    rooms: [
      { x: -5, z: -3, w: 6, d: 6, name: '教室 A', color: 0xe4e8f0 },
      { x: 1, z: -3, w: 6, d: 6, name: '教室 B', color: 0xe4e8f0 },
      { x: -5, z: 3, w: 4, d: 4, name: '走廊', color: 0xd6d3d1 },
      { x: -1, z: 3, w: 4, d: 4, name: '准备室', color: 0xd6d3d1 },
      { x: 3, z: 3, w: 4, d: 4, name: '楼梯间', color: 0xc8c4c0 },
    ]
  },
  { // 3F: 办公
    label: '3F',
    rooms: [
      { x: -5, z: -3, w: 5, d: 6, name: '办公室 A', color: 0xf0f4e0 },
      { x: 0, z: -3, w: 5, d: 6, name: '办公室 B', color: 0xf0f4e0 },
      { x: -5, z: 3, w: 3, d: 4, name: '会议室', color: 0xd6d3d1 },
      { x: -2, z: 3, w: 3, d: 4, name: '茶水间', color: 0xd6d3d1 },
      { x: 1, z: 3, w: 3, d: 4, name: '走廊', color: 0xd6d3d1 },
      { x: 4, z: 3, w: 3, d: 4, name: '楼梯间', color: 0xc8c4c0 },
    ]
  },
  { // 4F: 屋顶
    label: '4F',
    rooms: [
      { x: -5, z: -3, w: 10, d: 6, name: '屋顶平台', color: 0xd6d3d1 },
      { x: -5, z: 3, w: 4, d: 4, name: '机房', color: 0xc8c4c0 },
      { x: 3, z: 3, w: 4, d: 4, name: '楼梯间', color: 0xc8c4c0 },
    ]
  },
];

// === Build floors ===
const allFloorGroups = [];
const roomLabels = [];

floorPlans.forEach((plan, fi) => {
  const group = new THREE.Group();
  group.position.y = fi * FLOOR_H;

  // Floor slab
  const slabGeo = new THREE.BoxGeometry(FLOOR_W, 0.2, FLOOR_D);
  const slabMat = new THREE.MeshStandardMaterial({ color: TOKENS.floor, roughness: 0.9 });
  const slab = new THREE.Mesh(slabGeo, slabMat);
  slab.receiveShadow = true;
  group.add(slab);

  // Rooms
  plan.rooms.forEach(room => {
    const roomGroup = new THREE.Group();

    // Room floor (slightly above slab)
    const rfGeo = new THREE.BoxGeometry(room.w, 0.05, room.d);
    const rfMat = new THREE.MeshStandardMaterial({ color: room.color, roughness: 0.95 });
    const rf = new THREE.Mesh(rfGeo, rfMat);
    rf.position.set(room.x, 0.12, room.z);
    rf.receiveShadow = true;
    roomGroup.add(rf);

    // Walls (4 sides, with gaps for doors)
    const wallMat = new THREE.MeshStandardMaterial({ color: TOKENS.wall, roughness: 0.8 });

    // Front wall (z - d/2)
    const wfGeo = new THREE.BoxGeometry(room.w, WALL_H, WALL_T);
    const wf = new THREE.Mesh(wfGeo, wallMat);
    wf.position.set(room.x, WALL_H / 2 + 0.2, room.z - room.d / 2);
    wf.castShadow = true;
    roomGroup.add(wf);

    // Back wall
    const wb = new THREE.Mesh(wfGeo, wallMat);
    wb.position.set(room.x, WALL_H / 2 + 0.2, room.z + room.d / 2);
    wb.castShadow = true;
    roomGroup.add(wb);

    // Left wall
    const wlGeo = new THREE.BoxGeometry(WALL_T, WALL_H, room.d);
    const wl = new THREE.Mesh(wlGeo, wallMat);
    wl.position.set(room.x - room.w / 2, WALL_H / 2 + 0.2, room.z);
    wl.castShadow = true;
    roomGroup.add(wl);

    // Right wall
    const wr = new THREE.Mesh(wlGeo, wallMat);
    wr.position.set(room.x + room.w / 2, WALL_H / 2 + 0.2, room.z);
    wr.castShadow = true;
    roomGroup.add(wr);

    group.add(roomGroup);
  });

  scene.add(group);
  allFloorGroups.push(group);
});

// === Room label sprites ===
function createLabel(text, position) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'transparent';
  ctx.fillRect(0, 0, 256, 64);
  ctx.font = '24px -apple-system, sans-serif';
  ctx.fillStyle = '#1B365D';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 40);

  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.8 });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(3, 0.75, 1);
  return sprite;
}

floorPlans.forEach((plan, fi) => {
  plan.rooms.forEach(room => {
    const label = createLabel(room.name, new THREE.Vector3(room.x, fi * FLOOR_H + 1.5, room.z));
    scene.add(label);
    roomLabels.push(label);
  });
});

// === Ground ===
const gGeo = new THREE.PlaneGeometry(40, 40);
const gMesh = new THREE.Mesh(gGeo, new THREE.MeshStandardMaterial({ color: 0xd6d3d1, roughness: 1 }));
gMesh.rotation.x = -Math.PI / 2;
gMesh.position.y = -0.01;
gMesh.receiveShadow = true;
scene.add(gMesh);

scene.add(new THREE.GridHelper(40, 40, 0xa8a29e, 0xd6d3d1));

// === Floor navigation ===
let currentFloor = 0;
let exploded = false;

function updateFloorLabel(text) {
  const el = document.getElementById('floor-label');
  el.textContent = text;
}

window.goFloor = function(index) {
  currentFloor = index;

  // Update buttons
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  // Animate floor visibility
  allFloorGroups.forEach((g, i) => {
    const targetOpacity = (i === index) ? 1 : 0.1;
    g.traverse(child => {
      if (child.isMesh && child.material) {
        tween(child.material, { opacity: targetOpacity,
          duration: 600,
          easing: 'easeInOutCubic', });
        child.material.transparent = true;
      }
    });
  });

  // Camera tween to focus on floor
  const targetY = index * FLOOR_H + 5;
  tween(camera.position, { x: 15, y: targetY + 8, z: 15,
    duration: 800,
    easing: 'easeInOutCubic', });
  tween(controls.target, { x: 0, y: targetY - 3, z: 0,
    duration: 800,
    easing: 'easeInOutCubic', });

  updateFloorLabel(floorPlans[index].label);
};

window.showAll = function() {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  allFloorGroups.forEach(g => {
    g.traverse(child => {
      if (child.isMesh && child.material) {
        tween(child.material, { opacity: 1,
          duration: 600,
          easing: 'easeInOutCubic', });
        child.material.transparent = false;
      }
    });
  });

  tween(camera.position, { x: 20, y: 18, z: 20,
    duration: 800,
    easing: 'easeInOutCubic', });
  tween(controls.target, { x: 0, y: 4, z: 0,
    duration: 800,
    easing: 'easeInOutCubic', });

  updateFloorLabel('ALL');
};

window.toggleExplode = function() {
  exploded = !exploded;
  allFloorGroups.forEach((g, i) => {
    const targetY = exploded ? i * (FLOOR_H * 1.8) : i * FLOOR_H;
    tween(g.position, { y: targetY,
      duration: 800,
      easing: 'easeInOutCubic', });
  });
};

// === Responsive ===
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// === Render loop ===
function renderLoop() {
  requestAnimationFrame(renderLoop);
  controls.update();
  renderer.render(scene, camera);
}
renderLoop();
</script>
</body>
</html>

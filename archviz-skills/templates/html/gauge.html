<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Gauge Chart</title></head>
<body style="margin:0;background:#f5f0eb;font-family:system-ui">
<!-- Gauge Chart — archviz-skills -->
<!-- Use for: single KPI display, progress toward goal, status indicator -->
<canvas id="c" width="300" height="200"></canvas>
<script>
const value = 72; // 0-100
const ctx=document.getElementById("c").getContext("2d");
const cx=150,cy=160,r=120;
// Background arc
ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,0);ctx.lineWidth=20;
ctx.strokeStyle="#e8e4e0";ctx.lineCap="round";ctx.stroke();
// Value arc
const angle=Math.PI+(value/100)*Math.PI;
ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,angle);ctx.lineWidth=20;
ctx.strokeStyle=value>70?"#002FA7":value>40?"#94a3b8":"#a8a29e";
ctx.lineCap="round";ctx.stroke();
// Value text
ctx.fillStyle="#1B365D";ctx.font="bold 36px system-ui";ctx.textAlign="center";
ctx.fillText(value+"%",cx,cy-10);
ctx.fillStyle="#44403c";ctx.font="13px system-ui";
ctx.fillText("of target",cx,cy+14);
</script>
</body></html>

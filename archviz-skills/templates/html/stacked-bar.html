<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Stacked Bar</title></head>
<body style="margin:0;background:#f5f0eb;font-family:system-ui">
<!-- Stacked Bar Chart — archviz-skills -->
<!-- Use for: part-to-whole comparison across categories -->
<canvas id="c" width="600" height="350"></canvas>
<script>
const data = [
  {label:"Q1",values:[30,20,15]},
  {label:"Q2",values:[35,25,10]},
  {label:"Q3",values:[28,22,18]},
  {label:"Q4",values:[40,18,12]}
];
const colors=["#002FA7","#94a3b8","#d6d3d1"];
const labels=["Product","Service","Other"];
const ctx=document.getElementById("c").getContext("2d");
const l=80,r=560,t=40,b=300,barW=80,gap=30;
const max=Math.max(...data.map(d=>d.values.reduce((a,b)=>a+b,0)));
data.forEach((d,i)=>{
  const x=l+i*(barW+gap);
  let y=b;
  d.values.forEach((v,j)=>{
    const h=(v/max)*(b-t);
    ctx.fillStyle=colors[j];
    ctx.fillRect(x,y-h,barW,h-2);
    y-=h;
  });
  ctx.fillStyle="#44403c";ctx.font="13px system-ui";ctx.textAlign="center";
  ctx.fillText(d.label,x+barW/2,b+18);
});
// Legend
labels.forEach((l,i)=>{
  ctx.fillStyle=colors[i];ctx.fillRect(80+i*100,10,14,14);
  ctx.fillStyle="#44403c";ctx.font="12px system-ui";ctx.fillText(l,100+i*100,22);
});
</script>
</body></html>

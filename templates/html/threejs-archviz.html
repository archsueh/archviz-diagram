<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>3D Architecture</title>
<style>body{margin:0;overflow:hidden;background:#f5f0eb}canvas{display:block}</style>
</head>
<body>
<!-- Three.js 3D Architecture — archviz-skills -->
<!-- Use for: building visualization, spatial walkthrough, 3D structure -->
<!-- Requires: three.js (CDN) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f0eb);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Materials (restrained palette)
const matWall = new THREE.MeshStandardMaterial({color: 0xe8e4e0, roughness: 0.9});
const matAccent = new THREE.MeshStandardMaterial({color: 0x002FA7, roughness: 0.3});
const matFloor = new THREE.MeshStandardMaterial({color: 0xd6d3d1, roughness: 0.8});

// Floor
const floor = new THREE.Mesh(new THREE.BoxGeometry(12, 0.2, 8), matFloor);
floor.position.y = -0.1;
floor.receiveShadow = true;
scene.add(floor);

// Walls
function addWall(x, y, z, w, h, d) {
  const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), matWall);
  wall.position.set(x, y, z);
  wall.castShadow = true;
  wall.receiveShadow = true;
  scene.add(wall);
}
addWall(0, 1.5, -4, 12, 3, 0.2);   // back
addWall(-6, 1.5, 0, 0.2, 3, 8);     // left
addWall(6, 1.5, 0, 0.2, 3, 8);      // right

// Accent element
const accent = new THREE.Mesh(new THREE.BoxGeometry(2, 2.5, 0.3), matAccent);
accent.position.set(0, 1.25, -3.8);
scene.add(accent);

// Columns
for (let i = -4; i <= 4; i += 4) {
  const col = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 3, 8), matWall);
  col.position.set(i, 1.5, 2);
  col.castShadow = true;
  scene.add(col);
}

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
scene.add(dirLight);

camera.position.set(8, 6, 10);
camera.lookAt(0, 1, 0);

// Orbit
let angle = 0;
function animate() {
  requestAnimationFrame(animate);
  angle += 0.003;
  camera.position.x = 10 * Math.cos(angle);
  camera.position.z = 10 * Math.sin(angle);
  camera.lookAt(0, 1, 0);
  renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body></html>

<!-- archviz-skills upgrade Phase 2 | 2026-06-13 -->
<!-- Motion Module — animejs v4 wrapper + staged reveal + reduced-motion support -->
<!-- Requires: _archviz-theme.html loaded in <head> -->
<!-- Requires: animejs v4 via CDN importmap (for 3D) or inline lightweight easing (for 2D) -->
<style id="archviz-motion-styles">
/* Reduced motion: keep opacity transition, drop movement */
@media (prefers-reduced-motion: reduce) {
  [data-reveal] {
    transition: opacity 200ms ease-out !important;
    transform: none !important;
  }
  .archviz-stagger {
    animation: none !important;
    transition: none !important;
    opacity: 1 !important;
    transform: none !important;
  }
}
/* Print: no animation */
@media print {
  [data-reveal], .archviz-stagger { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }
}
/* Base reveal state */
[data-reveal] {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 250ms cubic-bezier(0.16, 1, 0.3, 1), transform 250ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-reveal].revealed {
  opacity: 1;
  transform: translateY(0);
}
/* Reveal variants */
[data-reveal="fade"] { transform: none; }
[data-reveal="slide-left"] { transform: translateX(-12px); }
[data-reveal="slide-right"] { transform: translateX(12px); }
[data-reveal="scale"] { transform: scale(0.95); }
[data-reveal="pop"] { transform: scale(0.92); transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
[data-reveal="pop"].revealed { transform: scale(1); }
</style>

<script>
/* archviz-skills Motion System
 * API:
 *   initReveal()           — scan [data-reveal] elements, set up IntersectionObserver
 *   revealElement(el)      — trigger reveal on specific element
 *   staggerReveal(els, ms) — staggered reveal with delay per item
 *   counterUp(el, target)  — animate number from 0 to target
 *   drawSVGPath(el, dur)   — animate SVG path stroke-dashoffset
 *
 * Vocabulary (from animation-vocabulary.md):
 *   rise-in-fast  = data-reveal (default)
 *   fade-in       = data-reveal="fade"
 *   slide-in-left = data-reveal="slide-left"
 *   slide-in-right= data-reveal="slide-right"
 *   scale-in      = data-reveal="scale"
 *   pop-in        = data-reveal="pop"
 */
(function() {
  'use strict';

  // Easing functions (no external dependency for 2D)
  const ease = {
    linear: t => t,
    easeOut: t => 1 - Math.pow(1 - t, 3),
    easeInOut: t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
    spring: t => {
      const c4 = (2 * Math.PI) / 3;
      return t === 0 ? 0 : t === 1 ? 1 :
        Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
    }
  };

  // --- IntersectionObserver-based reveal ---
  let observer = null;

  function initReveal() {
    if (observer) observer.disconnect();

    // Check reduced motion preference
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const elements = document.querySelectorAll('[data-reveal]');
    if (prefersReduced) {
      elements.forEach(el => el.classList.add('revealed'));
      return;
    }

    observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const delay = parseInt(el.dataset.revealDelay || '0', 10);
          setTimeout(() => el.classList.add('revealed'), delay);
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.1 });

    elements.forEach((el, i) => {
      // Auto-assign stagger delay if not set
      if (!el.dataset.revealDelay && el.dataset.revealStagger !== undefined) {
        el.dataset.revealDelay = String(i * (parseInt(el.dataset.revealStagger, 10) || 60));
      }
      observer.observe(el);
    });
  }

  function revealElement(el) {
    el.classList.add('revealed');
  }

  function staggerReveal(els, ms) {
    ms = ms || 60;
    els.forEach((el, i) => {
      setTimeout(() => el.classList.add('revealed'), i * ms);
    });
  }

  // --- Counter animation ---
  function counterUp(el, target, duration) {
    duration = duration || 800;
    const start = performance.now();
    const initial = 0;
    const format = el.dataset.counterFormat || 'int'; // 'int', 'percent', 'decimal'

    function update(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = ease.easeOut(progress);
      const current = initial + (target - initial) * eased;

      if (format === 'percent') {
        el.textContent = Math.round(current) + '%';
      } else if (format === 'decimal') {
        el.textContent = current.toFixed(1);
      } else {
        el.textContent = Math.round(current).toLocaleString();
      }

      if (progress < 1) requestAnimationFrame(update);
    }

    requestAnimationFrame(update);
  }

  // --- SVG path drawing ---
  function drawSVGPath(pathEl, duration) {
    duration = duration || 1000;
    const length = pathEl.getTotalLength();
    pathEl.style.strokeDasharray = length;
    pathEl.style.strokeDashoffset = length;
    pathEl.style.transition = 'none';

    // Force reflow
    pathEl.getBoundingClientRect();

    pathEl.style.transition = `stroke-dashoffset ${duration}ms ease-out`;
    pathEl.style.strokeDashoffset = '0';
  }

  // --- Canvas bar animation ---
  function animateCanvasBars(canvas, drawFn, duration) {
    duration = duration || 800;
    const start = performance.now();

    function frame(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = ease.easeOut(progress);
      drawFn(eased);
      if (progress < 1) requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  }

  // --- Auto-init on DOMContentLoaded ---
  function init() {
    initReveal();
  }

  // Expose API
  window.archvizMotion = {
    initReveal, revealElement, staggerReveal,
    counterUp, drawSVGPath, animateCanvasBars, ease
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

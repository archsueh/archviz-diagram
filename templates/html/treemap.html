<!DOCTYPE html>

<head>

<title>Treemap — archviz-skills</title>
<!-- === Theme System Module === -->
<style id="archviz-theme-vars">
:root, [data-palette="warm-paper"] {
  --av-surface: #f5f0eb; --av-surface-alt: #e8e4e0; --av-surface-raised: #faf9f5;
  --av-text-primary: #1B365D; --av-text-secondary: #5e5d59; --av-text-tertiary: #87867f;
  --av-border: #d6d3d1; --av-accent: #002FA7; --av-accent-soft: rgba(0,47,167,0.12);
  --av-chart-1: #002FA7; --av-chart-2: #94a3b8; --av-chart-3: #a8a29e; --av-chart-4: #d6d3d1; --av-chart-5: #c96442; --av-chart-6: #5e5d59;
}
[data-palette="swiss-neutral"] {
  --av-surface: #f8f8f6; --av-surface-alt: #efeeec; --av-surface-raised: #ffffff;
  --av-text-primary: #1a1a18; --av-text-secondary: #5f5e5a; --av-text-tertiary: #88877f;
  --av-border: #d9d8d4; --av-accent: #185FA5; --av-accent-soft: rgba(24,95,165,0.10);
  --av-chart-1: #185FA5; --av-chart-2: #0F6E56; --av-chart-3: #534AB7; --av-chart-4: #993C1D; --av-chart-5: #854F0B; --av-chart-6: #5F5E5A;
}
[data-palette="editorial-parchment"] {
  --av-surface: #f5f4ed; --av-surface-alt: #e8e6dc; --av-surface-raised: #faf9f5;
  --av-text-primary: #141413; --av-text-secondary: #5e5d59; --av-text-tertiary: #87867f;
  --av-border: #c9c7bc; --av-accent: #c96442; --av-accent-soft: rgba(201,100,66,0.12);
  --av-chart-1: #c96442; --av-chart-2: #5e5d59; --av-chart-3: #87867f; --av-chart-4: #b0aea5; --av-chart-5: #141413; --av-chart-6: #d6d3d1;
}
[data-palette="ikb-dark"], [data-theme="dark"]:not([data-palette]) {
  --av-surface: #1a1a2e; --av-surface-alt: #252540; --av-surface-raised: #2a2a45;
  --av-text-primary: #e8e6de; --av-text-secondary: #b4b2a9; --av-text-tertiary: #888780;
  --av-border: rgba(255,255,255,0.15); --av-accent: #6B8AFF; --av-accent-soft: rgba(107,138,255,0.15);
  --av-chart-1: #6B8AFF; --av-chart-2: #5DCAA5; --av-chart-3: #AFA9EC; --av-chart-4: #F0997B; --av-chart-5: #EF9F27; --av-chart-6: #b4b2a9;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-palette]):not([data-theme]) {
    --av-surface: #1a1a2e; --av-surface-alt: #252540; --av-surface-raised: #2a2a45;
    --av-text-primary: #e8e6de; --av-text-secondary: #b4b2a9; --av-text-tertiary: #888780;
    --av-border: rgba(255,255,255,0.15); --av-accent: #6B8AFF; --av-accent-soft: rgba(107,138,255,0.15);
    --av-chart-1: #6B8AFF; --av-chart-2: #5DCAA5; --av-chart-3: #AFA9EC; --av-chart-4: #F0997B; --av-chart-5: #EF9F27; --av-chart-6: #b4b2a9;
  }
}
#archviz-theme-toggle{position:fixed;top:12px;right:12px;z-index:9999;background:var(--av-surface-raised);border:1px solid var(--av-border);border-radius:8px;padding:6px 12px;font:12px/1 system-ui,sans-serif;color:var(--av-text-secondary);cursor:pointer;transition:background 0.2s;backdrop-filter:blur(8px);}
#archviz-theme-toggle:hover{background:var(--av-surface-alt);border-color:var(--av-text-tertiary);}
</style>
<style id="archviz-export-styles">
#archviz-export-btn{position:fixed;top:12px;right:140px;z-index:9999;background:var(--av-surface-raised);border:1px solid var(--av-border);border-radius:8px;padding:6px 12px;font:12px/1 system-ui,sans-serif;color:var(--av-text-secondary);cursor:pointer;transition:background 0.2s;backdrop-filter:blur(8px);}
#archviz-export-btn:hover{background:var(--av-surface-alt);}
#archviz-export-menu{display:none;position:fixed;top:44px;right:140px;z-index:10000;background:var(--av-surface-raised);border:1px solid var(--av-border);border-radius:10px;padding:6px 0;min-width:180px;box-shadow:0 4px 20px rgba(0,0,0,0.12);backdrop-filter:blur(12px);}
#archviz-export-menu.open{display:block;}
#archviz-export-menu button{display:block;width:100%;text-align:left;padding:8px 16px;border:none;background:none;font:13px/1.4 system-ui,sans-serif;color:var(--av-text-primary);cursor:pointer;}
#archviz-export-menu button:hover{background:var(--av-accent-soft);}
#archviz-export-menu .sep{height:1px;background:var(--av-border);margin:4px 0;}
#archviz-export-menu .shortcut{float:right;color:var(--av-text-tertiary);font-size:11px;}
#archviz-export-toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10001;background:var(--av-surface-raised);border:1px solid var(--av-border);border-radius:8px;padding:10px 20px;font:13px/1 system-ui,sans-serif;color:var(--av-text-primary);box-shadow:0 4px 16px rgba(0,0,0,0.12);animation:archviz-toast-in 0.3s ease;}
@keyframes archviz-toast-in{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--av-surface); font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" class="archviz-export-target" width="800" height="500"></canvas>
<script>
/* Treemap — archviz-skills (canvas, theme-reactive)
 * Data colors map to --av-chart-1..4. Redraws on theme change.
 */
function getCSSVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

const data = [
  {label:"Product A",value:45},
  {label:"Product B",value:25},
  {label:"Product C",value:18},
  {label:"Product D",value:12}
];

function drawTreemap() {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const total = data.reduce((s, d) => s + d.value, 0);

  // Theme-aware colors
  const colors = [
    getCSSVar('--av-chart-1') || '#002FA7',
    getCSSVar('--av-chart-2') || '#94a3b8',
    getCSSVar('--av-chart-3') || '#a8a29e',
    getCSSVar('--av-chart-4') || '#d6d3d1',
  ];
  const bgColor = getCSSVar('--av-surface') || '#f5f0eb';

  // Clear
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, 800, 500);

  let x = 20, y = 20, w = 760, h = 460;

  data.forEach((d, i) => {
    const frac = d.value / total;
    const isWide = w > h;
    const dw = isWide ? w * frac : h * frac;

    ctx.fillStyle = colors[i % colors.length];

    if (isWide) {
      ctx.fillRect(x, y, dw - 4, h - 4);
      // Label
      ctx.fillStyle = '#ffffff';
      ctx.font = '14px system-ui';
      ctx.textAlign = 'left';
      ctx.fillText(d.label + ' (' + d.value + '%)', x + 12, y + 28);
      x += dw;
    } else {
      ctx.fillRect(x, y, w - 4, dw - 4);
      ctx.fillStyle = '#ffffff';
      ctx.font = '14px system-ui';
      ctx.textAlign = 'left';
      ctx.fillText(d.label + ' (' + d.value + '%)', x + 12, y + 28);
      y += dw;
    }
  });
}

drawTreemap();
window.addEventListener('archviz-theme-changed', drawTreemap);
</script>

<!-- === Theme System Script === -->
<script>
(function() {
  'use strict';
  const PALETTES = {
    'warm-paper':          { label: 'Warm Paper',    mode: 'light' },
    'swiss-neutral':       { label: 'Swiss Neutral',  mode: 'light' },
    'editorial-parchment': { label: 'Editorial',      mode: 'light' },
    'ikb-dark':            { label: 'IKB Dark',       mode: 'dark'  },
  };
  window.ARCHVIZ_PALETTES = PALETTES;
  let currentPalette = 'warm-paper';
  function applyPalette(name) {
    if (!PALETTES[name]) return;
    currentPalette = name;
    document.documentElement.setAttribute('data-palette', name);
    document.documentElement.setAttribute('data-theme', PALETTES[name].mode);
    localStorage.setItem('archviz-palette', name);
    updateToggleLabel();
    window.dispatchEvent(new Event('archviz-theme-changed'));
  }
  function toggleTheme() {
    const order = ['warm-paper','swiss-neutral','editorial-parchment','ikb-dark'];
    applyPalette(order[(order.indexOf(currentPalette)+1)%order.length]);
  }
  function getCurrentPalette() { return currentPalette; }
  function isDark() { return PALETTES[currentPalette]?.mode === 'dark'; }
  function updateToggleLabel() {
    const btn = document.getElementById('archviz-theme-toggle');
    if (btn) btn.textContent = PALETTES[currentPalette]?.label || currentPalette;
  }
  function init() {
    const saved = localStorage.getItem('archviz-palette');
    if (saved && PALETTES[saved]) applyPalette(saved);
    else if (window.matchMedia('(prefers-color-scheme: dark)').matches) applyPalette('ikb-dark');
    const btn = document.createElement('button');
    btn.id = 'archviz-theme-toggle';
    btn.textContent = PALETTES[currentPalette]?.label || 'Theme';
    btn.addEventListener('click', toggleTheme);
    document.body.appendChild(btn);
  }
  window.archvizTheme = { applyPalette, toggleTheme, getCurrentPalette, isDark, init };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>

<!-- === Export System Script === -->
<script>
(function() {
  'use strict';
  const SCALE_DEFAULT = 4;
  function toast(msg) {
    let el = document.getElementById('archviz-export-toast');
    if (!el) { el = document.createElement('div'); el.id = 'archviz-export-toast'; document.body.appendChild(el); }
    el.textContent = msg; el.style.display = 'block'; clearTimeout(el._t);
    el._t = setTimeout(() => el.style.display = 'none', 2200);
  }
  function findTarget(selector) {
    if (selector) return document.querySelector(selector);
    return document.querySelector('.archviz-export-target')
      || document.querySelector('svg') || document.querySelector('canvas')
      || document.querySelector('article, .card, .canvas');
  }
  function svgToBlob(svgEl, scale, format) {
    return new Promise((resolve, reject) => {
      const vb = svgEl.viewBox?.baseVal;
      const w = vb?.width || svgEl.clientWidth || 800;
      const h = vb?.height || svgEl.clientHeight || 600;
      const clone = svgEl.cloneNode(true);
      const computed = getComputedStyle(document.documentElement);
      const vars = ['--av-surface','--av-surface-alt','--av-text-primary','--av-text-secondary','--av-text-tertiary','--av-border','--av-accent','--av-chart-1','--av-chart-2','--av-chart-3','--av-chart-4','--av-chart-5','--av-chart-6'];
      let varCSS = ':root{'; vars.forEach(v=>{varCSS+=v+':'+computed.getPropertyValue(v).trim()+';';}); varCSS+='}';
      let styleEl = clone.querySelector('style');
      if(!styleEl){styleEl=document.createElementNS('http://www.w3.org/2000/svg','style');clone.insertBefore(styleEl,clone.firstChild);}
      styleEl.textContent = varCSS + styleEl.textContent;
      clone.setAttribute('width', w*scale); clone.setAttribute('height', h*scale);
      if(!clone.getAttribute('viewBox')) clone.setAttribute('viewBox','0 0 '+w+' '+h);
      const svgStr = new XMLSerializer().serializeToString(clone);
      const url = URL.createObjectURL(new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'}));
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas'); canvas.width=w*scale; canvas.height=h*scale;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = computed.getPropertyValue('--av-surface').trim()||'#f5f0eb';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img,0,0); URL.revokeObjectURL(url);
        canvas.toBlob(blob=>{if(blob)resolve(blob);else reject(new Error('toBlob failed'));},format||'image/png');
      };
      img.onerror = ()=>{URL.revokeObjectURL(url);reject(new Error('SVG load failed'));};
      img.src = url;
    });
  }
  function canvasToBlob(canvasEl, scale, format) {
    return new Promise((resolve, reject) => {
      if (canvasEl.renderAtScale) {
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width=canvasEl.width*scale; tmpCanvas.height=canvasEl.height*scale;
        const ctx = tmpCanvas.getContext('2d'); ctx.scale(scale,scale);
        canvasEl.renderAtScale(ctx,scale);
        tmpCanvas.toBlob(blob=>blob?resolve(blob):reject(new Error('toBlob failed')),format||'image/png');
      } else {
        const tmpCanvas = document.createElement('canvas');
        tmpCanvas.width=canvasEl.width*scale; tmpCanvas.height=canvasEl.height*scale;
        const ctx = tmpCanvas.getContext('2d');
        ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high';
        ctx.drawImage(canvasEl,0,0,tmpCanvas.width,tmpCanvas.height);
        tmpCanvas.toBlob(blob=>blob?resolve(blob):reject(new Error('toBlob failed')),format||'image/png');
      }
    });
  }
  async function exportBlob(target, scale, format) {
    scale = scale||SCALE_DEFAULT;
    if(target.tagName==='SVG') return svgToBlob(target,scale,format);
    if(target.tagName==='CANVAS') return canvasToBlob(target,scale,format);
    const w=target.scrollWidth||target.clientWidth||800, h=target.scrollHeight||target.clientHeight||600;
    const canvas=document.createElement('canvas'); canvas.width=w*scale; canvas.height=h*scale;
    const ctx=canvas.getContext('2d'); ctx.scale(scale,scale);
    ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--av-surface').trim()||'#f5f0eb';
    ctx.fillRect(0,0,w,h);
    const svgStr='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">'+target.outerHTML+'</div></foreignObject></svg>';
    const url=URL.createObjectURL(new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'}));
    return new Promise((resolve,reject)=>{
      const img=new Image();
      img.onload=()=>{ctx.drawImage(img,0,0);URL.revokeObjectURL(url);canvas.toBlob(b=>b?resolve(b):reject(new Error('toBlob failed')),format||'image/png');};
      img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('HTML export failed'));};
      img.src=url;
    });
  }
  function download(blob,filename){const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);}
  async function exportPNG(selector,scale){const t=findTarget(selector);if(!t){toast('No export target');return;}try{const b=await exportBlob(t,scale||SCALE_DEFAULT,'image/png');download(b,'archviz-'+Date.now()+'.png');toast('PNG exported (4× raster)');}catch(e){toast('Export failed: '+e.message);console.error(e);}}
  async function exportWebP(selector,scale){const t=findTarget(selector);if(!t){toast('No export target');return;}try{const b=await exportBlob(t,scale||SCALE_DEFAULT,'image/webp');download(b,'archviz-'+Date.now()+'.webp');toast('WebP exported (4× raster)');}catch(e){toast('Export failed: '+e.message);console.error(e);}}
  async function exportSVG(selector){const t=findTarget(selector);if(!t||t.tagName!=='SVG'){toast('SVG export requires SVG target');return;}try{const clone=t.cloneNode(true);const computed=getComputedStyle(document.documentElement);const vars=['--av-surface','--av-surface-alt','--av-text-primary','--av-text-secondary','--av-text-tertiary','--av-border','--av-accent','--av-chart-1','--av-chart-2','--av-chart-3','--av-chart-4','--av-chart-5','--av-chart-6'];let varCSS=':root{';vars.forEach(v=>{varCSS+=v+':'+computed.getPropertyValue(v).trim()+';';});varCSS+='}';let styleEl=clone.querySelector('style');if(!styleEl){styleEl=document.createElementNS('http://www.w3.org/2000/svg','style');clone.insertBefore(styleEl,clone.firstChild);}styleEl.textContent=varCSS+styleEl.textContent;const svgStr=new XMLSerializer().serializeToString(clone);download(new Blob([svgStr],{type:'image/svg+xml;charset=utf-8'}),'archviz-'+Date.now()+'.svg');toast('SVG exported (with theme vars)');}catch(e){toast('SVG export failed: '+e.message);console.error(e);}}
  async function copyToClipboard(selector){const t=findTarget(selector);if(!t){toast('No export target');return;}try{const b=await exportBlob(t,SCALE_DEFAULT,'image/png');if(navigator.clipboard&&window.ClipboardItem){await navigator.clipboard.write([new ClipboardItem({'image/png':b})]);toast('Copied to clipboard (4× PNG)');}else{const reader=new FileReader();reader.onload=()=>{console.log('Clipboard fallback — data URL:',reader.result);};reader.readAsDataURL(b);toast('Clipboard unavailable — data URL logged');}}catch(e){toast('Clipboard failed: '+e.message);console.error(e);}}
  function createMenu(){const btn=document.createElement('button');btn.id='archviz-export-btn';btn.textContent='Export';btn.addEventListener('click',toggleMenu);const menu=document.createElement('div');menu.id='archviz-export-menu';menu.innerHTML='<button data-action="png">Export PNG <span class="shortcut">E→P</span></button><button data-action="svg">Export SVG <span class="shortcut">E→S</span></button><button data-action="webp">Export WebP <span class="shortcut">E→W</span></button><div class="sep"></div><button data-action="clipboard">Copy to Clipboard <span class="shortcut">E→C</span></button>';menu.addEventListener('click',(e)=>{const action=e.target.closest('button')?.dataset?.action;if(!action)return;closeMenu();if(action==='png')exportPNG();else if(action==='svg')exportSVG();else if(action==='webp')exportWebP();else if(action==='clipboard')copyToClipboard();});document.body.appendChild(btn);document.body.appendChild(menu);}
  function toggleMenu(){const m=document.getElementById('archviz-export-menu');if(m)m.classList.toggle('open');}
  function closeMenu(){const m=document.getElementById('archviz-export-menu');if(m)m.classList.remove('open');}
  let pendingE=false,pendingETimer=null;
  document.addEventListener('keydown',(e)=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;if(e.target.tagName==='CANVAS'&&document.querySelector('canvas[data-orbit]'))return;const key=e.key.toLowerCase();if(key==='t'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();window.archvizTheme?.toggleTheme();return;}if(key==='e'&&!e.metaKey&&!e.ctrlKey&&!e.altKey){e.preventDefault();if(pendingE){clearTimeout(pendingETimer);pendingE=false;return;}pendingE=true;toggleMenu();pendingETimer=setTimeout(()=>{pendingE=false;},800);return;}if(pendingE){clearTimeout(pendingETimer);pendingE=false;closeMenu();if(key==='p')exportPNG();else if(key==='s')exportSVG();else if(key==='w')exportWebP();else if(key==='c')copyToClipboard();return;}if(key==='escape')closeMenu();});
  document.addEventListener('click',(e)=>{if(!e.target.closest('#archviz-export-menu')&&!e.target.closest('#archviz-export-btn'))closeMenu();});
  window.archvizExport={exportPNG,exportSVG,exportWebP,copyToClipboard};
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',createMenu);else createMenu();
})();
</script>
</body>

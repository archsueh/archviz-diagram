<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data Dashboard</title>
<style>
:root {
  --av-surface: #ffffff; --av-bg: #f5f5f7; --av-border: #e0e0e4;
  --av-text-primary: #1d1d1f; --av-text-secondary: #6e6e73;
  --av-accent: #0071e3; --av-accent-subtle: #e8f2fd;
  --av-success: #34c759; --av-warning: #ff9f0a;
  --av-radius: 12px; --av-shadow: 0 1px 3px rgba(0,0,0,.08);
  --av-font: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --av-mono: 'SF Mono', 'Menlo', monospace;
}
.dark {
  --av-surface: #1c1c1e; --av-bg: #000000; --av-border: #38383a;
  --av-text-primary: #f5f5f7; --av-text-secondary: #98989d;
  --av-accent: #0a84ff; --av-accent-subtle: #0a84ff18;
  --av-shadow: 0 1px 3px rgba(0,0,0,.4);
}
* { margin: 0; box-sizing: border-box; }
body { font-family: var(--av-font); background: var(--av-bg); color: var(--av-text-primary);
  padding: 2rem; line-height: 1.5; transition: background .3s, color .3s; }
.toggle { position: fixed; top: 1rem; right: 1rem; background: var(--av-surface);
  border: 1px solid var(--av-border); border-radius: 8px; padding: .4rem .8rem;
  cursor: pointer; font-size: .85rem; color: var(--av-text-secondary); }
.toggle:hover { color: var(--av-accent); }
h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: .3rem; }
.subtitle { color: var(--av-text-secondary); font-size: .85rem; margin-bottom: 1.5rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.card { background: var(--av-surface); border: 1px solid var(--av-border);
  border-radius: var(--av-radius); padding: 1.2rem; box-shadow: var(--av-shadow); }
.card-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .06em;
  color: var(--av-text-secondary); margin-bottom: .4rem; }
.card-value { font-size: 1.8rem; font-weight: 700; font-family: var(--av-mono); }
.card-change { font-size: .75rem; margin-top: .3rem; }
.up { color: var(--av-success); } .down { color: #ff3b30; }
.chart { background: var(--av-surface); border: 1px solid var(--av-border);
  border-radius: var(--av-radius); padding: 1.5rem; box-shadow: var(--av-shadow); }
.chart-title { font-size: .85rem; font-weight: 600; margin-bottom: 1rem; }
.bar-group { display: flex; align-items: center; gap: .6rem; margin-bottom: .7rem; }
.bar-label { width: 3rem; font-size: .75rem; color: var(--av-text-secondary); text-align: right; }
.bar-track { flex: 1; height: 20px; background: var(--av-bg); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--av-accent); border-radius: 4px;
  transition: width .6s cubic-bezier(.4,0,.2,1); }
.bar-val { width: 2.5rem; font-size: .75rem; font-family: var(--av-mono); }
</style>
</head>
<body>
<button class="toggle" onclick="document.documentElement.classList.toggle('dark');document.body.classList.toggle('dark')">◐ Theme</button>
<h1>Q2 Performance</h1>
<p class="subtitle">June 2026 — Weekly summary</p>
<div class="grid">
  <div class="card"><div class="card-label">Revenue</div><div class="card-value">$1.24M</div><div class="card-change up">▲ 12.3%</div></div>
  <div class="card"><div class="card-label">Active Users</div><div class="card-value">38,491</div><div class="card-change up">▲ 8.7%</div></div>
  <div class="card"><div class="card-label">Churn Rate</div><div class="card-value">2.1%</div><div class="card-change down">▼ 0.4%</div></div>
</div>
<div class="chart">
  <div class="chart-title">Revenue by Segment ($K)</div>
  <div class="bar-group"><span class="bar-label">SaaS</span><div class="bar-track"><div class="bar-fill" style="width:78%"></div></div><span class="bar-val">486</span></div>
  <div class="bar-group"><span class="bar-label">Enterprise</span><div class="bar-track"><div class="bar-fill" style="width:62%"></div></div><span class="bar-val">384</span></div>
  <div class="bar-group"><span class="bar-label">Services</span><div class="bar-track"><div class="bar-fill" style="width:40%"></div></div><span class="bar-val">248</span></div>
  <div class="bar-group"><span class="bar-label">Other</span><div class="bar-track"><div class="bar-fill" style="width:20%"></div></div><span class="bar-val">122</span></div>
</div>
<script>if(window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.classList.add('dark');document.body.classList.add('dark');}</script>
</body>
</html>
